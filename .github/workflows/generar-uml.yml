name: Generar UML Automático

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Descargar Motor Oficial de PlantUML
      run: |
        # Descargamos la última versión estable directamente desde su repositorio oficial
        wget https://github.com/plantuml/plantuml/releases/download/v1.2024.4/plantuml-1.2024.4.jar -O plantuml.jar

    - name: Ingeniería Inversa y Renderizado
      run: |
        # Ejecutamos PlantUML apuntando directamente a tu carpeta de NetBeans.
        # Esto buscará todos los archivos .java dentro de Modulador/src/ y creará el diagrama de clases.
        java -jar plantuml.jar "Modulador/src/" -tpng -output "../.."
        
        # Renombramos el archivo generado para que coincida exactamente con tu README
        mv Modulador/src/src.png diagrama.png || echo "El archivo ya tiene el nombre correcto"

    - name: Subir cambios al repositorio de GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add diagrama.png
        git commit -m "Bot: Actualización automática del diagrama UML [skip ci]" || echo "No hay cambios en el diagrama"
        git push