name: Generar UML Automático

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Descargar Motor Oficial de PlantUML
      run: |
        wget https://github.com/plantuml/plantuml/releases/download/v1.2024.4/plantuml-1.2024.4.jar -O plantuml.jar

    - name: Renderizar diagrama UML a PNG
      run: |
        # Genera el diagrama. PlantUML creará un archivo llamado diagrama.png basado en diagrama.puml
        java -jar plantuml.jar diagrama.puml -tpng
        
        # Verificamos si se creó correctamente
        if [ ! -f "diagrama.png" ]; then
          echo "Error: diagrama.png no fue generado."
          exit 1
        fi

    - name: Subir imagen al repositorio
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Añadimos el archivo solo si existe
        git add diagrama.png
        git commit -m "Bot: Actualiza imagen del diagrama UML [skip ci]" || echo "No hay cambios para subir"
        git push