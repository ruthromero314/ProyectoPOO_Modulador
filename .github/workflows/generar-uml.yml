name: Generar UML Automático

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Ingeniería Inversa (Java a PlantUML)
      run: |
        # 1. Descargamos la herramienta que lee tus clases de NetBeans
        wget https://github.com/dbalek/puml-gen/releases/download/v1.0.0/puml-gen-1.0.0.jar -O puml-gen.jar
        java -jar puml-gen.jar Modulador/src/ > diagrama.puml

    - name: Renderizar archivo .puml a imagen PNG (Método Directo)
      run: |
        # 2. Descargamos el motor oficial de PlantUML directamente en formato .jar
        wget https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O plantuml.jar
        
        # 3. Lo ejecutamos nativamente con Java para generar la imagen
        java -jar plantuml.jar diagrama.puml

    - name: Subir cambios al repositorio de GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add diagrama.puml diagrama.png
        git commit -m "Bot: Actualización automática del diagrama UML [skip ci]" || echo "No hay cambios en el diagrama"
        git push